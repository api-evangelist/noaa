name: NOAA API Plans and Pricing
description: >-
  NOAA APIs are provided as free, open government data services funded by the
  US federal government. There are no commercial pricing tiers, subscription
  fees, or usage charges for any NOAA API. All data is in the public domain
  and free to use for any purpose, including commercial applications.
specificationVersion: '0.1'
plans:
  - name: Free Public Access
    description: >-
      All NOAA APIs are freely available to the public with no cost. The
      National Weather Service API requires only a User-Agent header for
      identification. The Climate Data Online API requires a free token
      obtained by registering an email address. Tides and Currents and
      Aviation Weather APIs require no authentication.
    url: https://www.weather.gov/documentation/services-web-api
    price: 0.00
    currency: USD
    unit: request
    rateLimits:
      - name: NWS API Rate Limit
        description: Generous unpublished limit; retry after ~5 seconds if exceeded
        limit: null
        period: generous
      - name: CDO API Rate Limit
        description: 5 requests per second, 10,000 requests per day per token
        limit: 10000
        period: day
      - name: Aviation Weather Rate Limit
        description: Maximum 100 requests per minute per user
        limit: 100
        period: minute
    features:
      - All weather forecast data
      - Active alerts and warnings
      - Historical climate records
      - Radar data
      - Tides and currents
      - Aviation weather products
      - Ocean and coastal observations
      - No license restrictions on data use
      - Public domain data
