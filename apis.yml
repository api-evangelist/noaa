apis:
  - name: National Weather Service API
    description: >-
      The NWS API provides public access to critical forecasts, alerts,
      observations, and other weather data through a RESTful, JSON-LD based
      web service. It supports gridpoint forecasts, active weather alerts,
      radar data, point-based lookups, zone forecasts, NWS office information,
      and NOAA Weather Radio scripts. The API is free, requires no
      authentication, and only asks that callers supply a User-Agent header
      for identification.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.weather.gov/documentation/services-web-api
    baseURL: https://api.weather.gov
    tags:
      - Weather
      - Forecast
      - Alerts
      - Radar
      - Observations
    properties:
      - type: Documentation
        url: https://www.weather.gov/documentation/services-web-api
      - type: OpenAPI
        url: https://api.weather.gov/openapi.json
      - type: OpenAPI
        url: openapi/noaa-nws-openapi.yml
      - type: JSONSchema
        url: json-schema/noaa-nws-alert.json
      - type: JSONSchema
        url: json-schema/noaa-nws-alertcollection.json
      - type: JSONSchema
        url: json-schema/noaa-nws-observation.json
      - type: JSONSchema
        url: json-schema/noaa-nws-zone.json
      - type: JSONSchema
        url: json-schema/noaa-nws-point.json
      - type: Examples
        url: examples/noaa-nws-alert-example.json
      - type: Examples
        url: examples/noaa-nws-gridpoint-forecast-example.json
      - type: GitHubRepository
        url: https://github.com/weather-gov/api
  - name: Climate Data Online (CDO) API
    description: >-
      The NOAA Climate Data Online Web Services API v2 provides RESTful access
      to the CDO database of historical weather and climate data maintained by
      the National Centers for Environmental Information (NCEI). Data types
      include daily summaries, normals, precipitation, temperatures, and storm
      events from thousands of global stations. Access requires a free token
      obtained by registering an email address with NCDC.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.ncdc.noaa.gov/cdo-web/webservices/v2
    baseURL: https://www.ncdc.noaa.gov/cdo-web/api/v2
    tags:
      - Climate
      - Historical Data
      - Weather Records
      - NCEI
    properties:
      - type: Documentation
        url: https://www.ncdc.noaa.gov/cdo-web/webservices/v2
      - type: TokenRequest
        url: https://www.ncdc.noaa.gov/cdo-web/token
  - name: CO-OPS Tides and Currents API
    description: >-
      The NOAA Center for Operational Oceanographic Products and Services
      (CO-OPS) Data Retrieval API provides access to water levels, tide
      predictions, currents, and meteorological observations from hundreds
      of monitoring stations around US coasts and inland waterways. Additional
      metadata and derived product APIs complement the primary data retrieval
      service. The API is free and requires no authentication.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://tidesandcurrents.noaa.gov/api/
    baseURL: https://api.tidesandcurrents.noaa.gov/api/prod
    tags:
      - Tides
      - Currents
      - Water Levels
      - Ocean
      - Coastal
    properties:
      - type: Documentation
        url: https://tidesandcurrents.noaa.gov/api/
      - type: MetadataAPI
        url: https://api.tidesandcurrents.noaa.gov/mdapi/prod/
  - name: Aviation Weather API
    description: >-
      The NOAA Aviation Weather Center Data API provides structured aviation
      weather products including METARs, TAFs, PIREPs, SIGMETs, G-AIRMETs,
      and station/airport information. It serves worldwide coverage for
      standard aeronautical weather and is used by pilots, dispatchers, and
      aviation weather services. The API returns data in JSON, XML, CSV,
      GeoJSON, and raw text formats, and enforces a rate limit of 100 requests
      per minute.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://aviationweather.gov/data/api/
    baseURL: https://aviationweather.gov/api/data
    tags:
      - Aviation
      - METAR
      - TAF
      - PIREP
      - SIGMET
    properties:
      - type: Documentation
        url: https://aviationweather.gov/data/api/
      - type: OpenAPI
        url: https://aviationweather.gov/data/schema/openapi.yaml
      - type: OpenAPI
        url: openapi/noaa-aviation-weather-openapi.yml
      - type: JSONSchema
        url: json-schema/noaa-aviation-metarjson.json
      - type: JSONSchema
        url: json-schema/noaa-aviation-tafjson.json
      - type: JSONSchema
        url: json-schema/noaa-aviation-pireptext.json
      - type: JSONSchema
        url: json-schema/noaa-aviation-airsigmetjson.json
      - type: Examples
        url: examples/noaa-aviation-metar-example.json
