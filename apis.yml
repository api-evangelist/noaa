name: NOAA
description: >-
  The National Oceanic and Atmospheric Administration (NOAA) provides a suite
  of publicly accessible REST APIs delivering weather observations, forecasts,
  alerts, climate data, ocean conditions, and historical environmental records
  from the US federal government. The National Weather Service API
  (api.weather.gov) offers real-time forecasts, active alerts, radar data,
  and observations across the continental United States and territories. NOAA
  also publishes the Climate Data Online (CDO) API for access to historical
  climate and weather datasets, the CO-OPS Tides and Currents API for water
  level and oceanographic data, and the Aviation Weather API for aeronautical
  weather products. All NOAA APIs are free to use as open government data with
  no licensing restrictions.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
